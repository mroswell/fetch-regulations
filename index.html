<body>
  <div id="loading-overlay">
    <div class="loader">
      <div class="spinner"></div>
      <p id="loading-text">Loading 2,441 comments…</p>
    </div>
  </div>

  <header>
    <div>
      <h1>Committee Comments</h1>
      <p class="subtitle">Public comments on ACIP docket <a href="https://www.regulations.gov/docket/CDC-2026-0199"
          target="_blank">CDC-2026-0199</a></p>
    </div>
    <nav>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="https://www.facebook.com/sharer/sharer.php?u=https%3A%2F%2Fcommitteecomments.com&quote=I%20appreciate%20this%20website%20that%20shares%20comments%20for%20the%20%28now%20disbanded%29%20CDC%20Advisory%20Committee%20on%20Immunization%20Practices" target="_blank" rel="noopener" class="social-icon" title="Share on Facebook"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg></a>

    </nav>
  </header>

  <main>
    <aside id="filters">
      <button id="filter-toggle" aria-expanded="false" aria-controls="filter-panel">
        Filters <span id="active-filter-count" hidden></span>
      </button>

      <div id="filter-panel">
        <div class="filter-group">
          <label for="search-input">Search</label>
          <input type="search" id="search-input" placeholder="Search comments…" autocomplete="off">
        </div>

        <div class="filter-group">
          <label for="name-input">Name</label>
          <input type="search" id="name-input" placeholder="Search by name…" autocomplete="off">
        </div>

        <div class="filter-group">
          <label for="perspective-select">Vaccine Perspective</label>
          <select id="perspective-select">
            <option value="">All perspectives</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="checkbox-label">
            <input type="checkbox" id="vaccine-injured-check">
            <span>Vaccine injured <span class="filter-count" id="injured-count"></span></span>
          </label>
        </div>

        <div class="filter-group">
          <label class="checkbox-label">
            <input type="checkbox" id="attachment-check">
            <span>Has attachment <span class="filter-count" id="attachment-count"></span></span>
          </label>
        </div>

        <div class="filter-group">
          <label class="checkbox-label">
            <input type="checkbox" id="organization-check">
            <span>Organization <span class="filter-count" id="organization-count"></span></span>
          </label>
        </div>

        <div class="filter-group">
          <label for="vaccine-select">Vaccine mentioned</label>
          <select id="vaccine-select">
            <option value="">All vaccines</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="tag-search">Tags</label>
          <div class="tag-dropdown" id="tag-dropdown">
            <input type="text" id="tag-search" placeholder="Search tags…" autocomplete="off">
            <div class="selected-tags" id="selected-tags" hidden></div>
            <div class="tag-list" id="tag-list" hidden></div>
          </div>
        </div>

        <button id="clear-filters" class="clear-btn">Clear all filters</button>
      </div>
    </aside>

    <section id="results">
      <div id="results-header">
        <span id="results-count"></span>
        <div id="sort-wrapper">
          <label for="sort-select">Sort by</label>
          <select id="sort-select">
            <option value="date">Date (newest)</option>
            <option value="date-asc">Date (oldest)</option>
            <option value="relevance" disabled>Relevance</option>
          </select>
        </div>
      </div>

      <div id="comment-cards"></div>

      <nav id="pagination" aria-label="Pagination"></nav>
    </section>
  </main>

  <script src="app.js"></script>
</body>

</html>
