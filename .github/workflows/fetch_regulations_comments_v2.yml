name: Fetch Regulations.gov Comments V2

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-comments:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas tqdm

      - name: Run script
        env:
          REGULATIONS_API_KEY: ${{ secrets.REGULATIONS_API_KEY }}
        run: python fetch_regulations_comments_v2.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: detailed-comments-v2
          path: detailed_comments_CDC-2026-0199_v2.csv

      - name: Commit CSV to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add detailed_comments_CDC-2026-0199_v2.csv
          git diff --staged --quiet || git commit -m "Update detailed_comments v2 [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write
