name: Fetch Comments — CDC-2025-0783 (ACIP Dec 2025)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-comments:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas tqdm

      - name: Run script
        env:
          REGULATIONS_API_KEY: ${{ secrets.REGULATIONS_API_KEY }}
          DOCKET_ID: CDC-2025-0783
          MAX_MINUTES: 330
        run: python scripts/fetch_regulations_comments.py

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: comments-CDC-2025-0783
          path: data/csv/comments_CDC-2025-0783.csv

      - name: Commit CSV to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/csv/comments_CDC-2025-0783.csv
          git stash
          git pull --rebase
          git stash pop
          git diff --staged --quiet || git commit -m "Fetch comments for CDC-2025-0783 [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
